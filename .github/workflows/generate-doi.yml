name: Generate DOI via Zenodo

on:
  release:
    types: [published]

jobs:
  generate-doi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Zenodo Deposit
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ZENODO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"metadata": {"title": "${{ github.event.release.name }}", "description": "${{ github.event.release.body }}", "creators": [{"name": "Associação MILK", "orcid": "0000-0000-0000-0000"}, {"name": "Eduardo Maurício Vieira Cabral e Araujo", "orcid": "0000-0000-0000-0000"}], "license": "EUPL-1.2", "keywords": ["Atlas Vivo MILK", "cultura", "património", "soberania digital"], "version": "${{ github.event.release.tag_name }}", "datePublished": "${{ github.event.release.published_at }}"}}' \
            https://zenodo.org/api/deposit/depositions
