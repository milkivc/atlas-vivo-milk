name: Validate ORCIDs

on:
  push:
    paths:
      - '**.json'
      - '**.md'
      - '**.yml'
      - '**.yaml'
  pull_request:
    paths:
      - '**.json'
      - '**.md'
      - '**.yml'
      - '**.yaml'

jobs:
  validate-orcids:
    name: Validate ORCIDs in repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Validate ORCIDs
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            
            // Função para validar ORCID
            function validateORCID(orcid, filePath) {
              const normalized = orcid.replace(/-/g, '').toLowerCase();
              if (!/^[0-9]{16}$/.test(normalized)) {
                console.error('❌ ORCID inválido:', orcid, 'em', filePath);
                return false;
              }
              console.log('✅ ORCID válido:', orcid, 'em', filePath);
              return true;
            }
            
            // Função recursiva para varrer diretórios
            function scanFiles(dir, fileList = []) {
              const files = fs.readdirSync(dir);
              files.forEach(file => {
                const filePath = path.join(dir, file);
                if (fs.statSync(filePath).isDirectory()) {
                  scanFiles(filePath, fileList);
                } else if (filePath.endsWith('.json') || filePath.endsWith('.md') || filePath.endsWith('.yml') || filePath.endsWith('.yaml')) {
                  fileList.push(filePath);
                }
              });
              return fileList;
            }
            
            // Procurar ORCIDs em arquivos (recursivamente)
            const allFiles = scanFiles('.');
            let allValid = true;
            let orcidCount = 0;
            
            allFiles.forEach(filePath => {
              try {
                const content = fs.readFileSync(filePath, 'utf8');
                const orcidMatches = content.match(/000[0-9]{3}-000[0-9]{3}-[0-9]{3}[0-9X]/g) || [];
                orcidMatches.forEach(orcid => {
                  orcidCount++;
                  if (!validateORCID(orcid, filePath)) {
                    allValid = false;
                  }
                });
              } catch (err) {
                console.error('⚠️ Erro ao ler arquivo:', filePath, err.message);
              }
            });
            
            console.log('📊 Total de ORCIDs encontrados:', orcidCount);
            console.log('📁 Arquivos verificados:', allFiles.length);
            
            if (!allValid) {
              console.error('❌ ORCIDs inválidos encontrados!');
              process.exit(1);
            }
          "

      - name: Check for placeholder ORCIDs
        run: |
          if grep -r "0000-0000-0000-0000" .; then
            echo "❌ ORCID placeholder (0000-0000-0000-0000) encontrado!"
            echo "Substitua por ORCIDs válidos:"
            echo "- Nuno Filipe: 0009-0009-1781-4020"
            echo "- Eduardo Maurício: 0009-0007-6892-6570"
            exit 1
          else
            echo "✅ Nenhum ORCID placeholder encontrado"
          fi

      - name: Check for missing ORCIDs in metadata
        run: |
          # Verificar se metadata.json tem ORCIDs válidos
          if [ -f "metadata.json" ]; then
            orcid_nuno=$(jq -r '.creators[] | select(.name | contains("Nuno")) | .orcid' metadata.json 2>/dev/null || echo "")
            orcid_eduardo=$(jq -r '.creators[] | select(.name | contains("Eduardo")) | .orcid' metadata.json 2>/dev/null || echo "")
            
            if [ "$orcid_nuno" != "0009-0009-1781-4020" ]; then
              echo "❌ ORCID do Nuno está incorreto em metadata.json: $orcid_nuno"
              exit 1
            fi
            
            if [ "$orcid_eduardo" != "0009-0007-6892-6570" ]; then
              echo "❌ ORCID do Eduardo está incorreto em metadata.json: $orcid_eduardo"
              exit 1
            fi
            
            echo "✅ ORCIDs em metadata.json estão corretos"
          fi
