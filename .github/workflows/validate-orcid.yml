name: Validate ORCID IDs

on:
  push:
    branches: [ master, main ]
    paths:
      - 'metadata.json'
      - '.zenodo.json'
      - 'src/backend/package.json'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'metadata.json'
      - '.zenodo.json'
      - 'src/backend/package.json'
  workflow_dispatch:

jobs:
  validate-orcid:
    name: Validate ORCID IDs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g ajv-cli jq

      - name: Extract ORCIDs from metadata.json
        id: extract-orcids
        run: |
          ORCIDS=$(jq -r '.creators[].orcid' metadata.json | grep -v "0000-0000-0000-0000" | tr '\n' ' ')
          echo "ORCIDS=$ORCIDS" >> $GITHUB_OUTPUT
          echo "Found ORCIDs: $ORCIDS"

      - name: Validate ORCID format
        run: |
          for file in metadata.json .zenodo.json; do
            if [ -f "$file" ]; then
              echo "Validating ORCIDs in $file..."
              invalid_orcids=$(jq -r '.creators[].orcid // empty' "$file" | grep -v "0000-0000-0000-0000" | grep -vE '^[0-9]{4}-[0-9]{4}-[0-9]{4}-[0-9]{4}$' || true)
              if [ -n "$invalid_orcids" ]; then
                echo "::error::Invalid ORCID format found in $file: $invalid_orcids"
                exit 1
              fi
              placeholder_orcids=$(jq -r '.creators[].orcid // empty' "$file" | grep "0000-0000-0000-0000" || true)
              if [ -n "$placeholder_orcids" ]; then
                echo "::warning::Placeholder ORCID (0000-0000-0000-0000) found in $file"
              fi
            fi
          done

      - name: Check ORCID API (optional)
        if: steps.extract-orcids.outputs.ORCIDS != ''
        run: |
          echo "ORCID format validation passed for all files"
          echo "To enable ORCID API validation, add ORCID_API_TOKEN secret"

  validate-metadata:
    name: Validate Metadata Schema
    runs-on: ubuntu-latest
    needs: validate-orcid
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AJV CLI
        run: npm install -g ajv-cli

      - name: Validate metadata.json against schema
        run: |
          ajv validate -s .github/schemas/metadata-schema.json -d metadata.json --spec=draft7

      - name: Validate all JSON files
        run: |
          for file in $(find . -type f -name "*.json" ! -path "./.git/*" ! -path "./.github/*" ! -path "./node_modules/*"); do
            jq empty "$file" || { echo "Invalid JSON: $file"; exit 1; }
          done
