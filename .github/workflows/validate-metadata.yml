name: Validate Metadata

on:
  push:
    branches: [ master, main ]
    paths:
      - 'metadata.json'
      - '.github/schemas/metadata-schema.json'
  pull_request:
    branches: [ master, main ]
    paths:
      - 'metadata.json'
      - '.github/schemas/metadata-schema.json'
  workflow_dispatch:

jobs:
  validate:
    name: Validate JSON-LD Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AJV CLI
        run: npm install -g ajv-cli

      - name: Validate metadata.json
        run: |
          ajv validate -s .github/schemas/metadata-schema.json -d metadata.json --spec=draft7

      - name: Validate all JSON files
        run: |
          for file in $(find . -type f -name "*.json" ! -path "./.git/*" ! -path "./.github/schemas/*"); do
            echo "Validating $file..."
            jq empty "$file" || { echo "Invalid JSON: $file"; exit 1; }
          done

  check-required-fields:
    name: Check Required Metadata Fields
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required fields
        run: |
          # Check if required fields are present
          REQUIRED_FIELDS=("title" "description" "license" "creators" "version" "datePublished")
          for field in "${REQUIRED_FIELDS[@]}"; do
            if ! jq -e ".$field" metadata.json > /dev/null 2>&1; then
              echo "Missing required field: $field"
              exit 1
            fi
          done
          
          # Check creators have ORCID
          CREATORS_COUNT=$(jq '.creators | length' metadata.json)
          for ((i=0; i<CREATORS_COUNT; i++)); do
            if ! jq -e ".creators[$i].orcid" metadata.json > /dev/null 2>&1; then
              echo "Creator $i is missing ORCID"
              exit 1
            fi
          done
          
          # Check version format
          VERSION=$(jq -r '.version' metadata.json)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi
          
          # Check date format
          DATE=$(jq -r '.datePublished' metadata.json)
          if [[ ! "$DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid date format: $DATE (expected YYYY-MM-DD)"
            exit 1
          fi
          
          # Check license is valid for this repo (EUPL-1.2 for code)
          LICENSE=$(jq -r '.license' metadata.json)
          if [ "$LICENSE" != "EUPL-1.2" ]; then
            echo "Invalid license for this repository: $LICENSE (expected EUPL-1.2)"
            exit 1
          fi
