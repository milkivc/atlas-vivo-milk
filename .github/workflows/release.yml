name: Release & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version format
        run: |
          if [[ ! "${{ steps.version.outputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: ${{ steps.version.outputs.version }}"
            exit 1
          fi

      - name: Update metadata version
        run: |
          jq --arg ver "${{ steps.version.outputs.version }}" '.version = $ver' metadata.json > metadata.tmp.json
          mv metadata.tmp.json metadata.json

      - name: Validate updated metadata
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        run: |
          npm install -g ajv-cli
          ajv validate -s .github/schemas/metadata-schema.json -d metadata.json --spec=draft7

      - name: Commit updated metadata
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add metadata.json
          git commit -m "chore: update version to ${{ steps.version.outputs.version }} [skip ci]" || true
          git push || true

  generate-doi:
    name: Generate DOI via Zenodo
    runs-on: ubuntu-latest
    needs: validate-release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release info
        id: release
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF" >> $GITHUB_OUTPUT

      - name: Create Zenodo deposit
        id: zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          # Create new deposition
          DEPOSIT_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "metadata": {
                "title": "${{ github.event.repository.name }} - ${{ steps.release.outputs.version }}",
                "description": "${{ github.event.repository.description || '' }} - Release ${{ steps.release.outputs.version }}",
                "upload_type": "software",
                "license": "EUPL-1.2",
                "version": "${{ steps.release.outputs.version }}",
                "publication_date": "$(date +%Y-%m-%d)",
                "creators": [
                  {"name": "Associação MILK - Movimentos de Intervenções e Linguagens Kulturais e Arte", "orcid": "0000-0000-0000-0000"},
                  {"name": "Eduardo Maurício Vieira Cabral e Araujo", "orcid": "0000-0000-0000-0000"}
                ],
                "keywords": ["Atlas Vivo MILK", "cultura", "património", "soberania digital", "interoperabilidade", "Portugal"],
                "notes": "Automatic release from GitHub: ${{ github.event.repository.html_url }}/releases/tag/${{ steps.release.outputs.tag }}"
              }
            }' \
            https://zenodo.org/api/deposit/depositions)
          
          DEPOSIT_ID=$(echo "$DEPOSIT_RESPONSE" | jq -r '.id')
          echo "deposit_id=$DEPOSIT_ID" >> $GITHUB_OUTPUT
          echo "DEPOSIT_ID=$DEPOSIT_ID" >> $GITHUB_ENV

      - name: Upload files to Zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          # Upload all source files
          for FILE in $(find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "*.gs" \) ! -path "./.git/*" ! -path "./.github/*" ! -path "./node_modules/*"); do
            echo "Uploading $FILE..."
            curl -s -X POST \
              -H "Authorization: Bearer $ZENODO_TOKEN" \
              -F "file=@$FILE" \
              "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID/files"
          done
          
          # Upload metadata
          curl -s -X POST \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -F "file=@metadata.json" \
            "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID/files"
          
          # Upload CITATION.cff if exists
          if [ -f "CITATION.cff" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $ZENODO_TOKEN" \
              -F "file=@CITATION.cff" \
              "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID/files"
          fi

      - name: Publish deposit
        id: publish
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          PUBLISH_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"published": true}' \
            "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID/actions/publish")
          
          DOI=$(echo "$PUBLISH_RESPONSE" | jq -r '.metadata.doi')
          echo "doi=$DOI" >> $GITHUB_OUTPUT
          echo "DOI=$DOI" >> $GITHUB_ENV

      - name: Update metadata with DOI
        run: |
          jq --arg doi "$DOI" '.doi = $doi' metadata.json > metadata.tmp.json
          mv metadata.tmp.json metadata.json
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add metadata.json
          git commit -m "chore: add DOI $DOI [skip ci]" || true
          git push || true

      - name: Update CITATION.cff with DOI
        run: |
          if [ -f "CITATION.cff" ]; then
            # Add DOI to CITATION.cff if not present
            if ! grep -q "doi:" CITATION.cff; then
              echo "doi: $DOI" >> CITATION.cff
              git config --global user.name "GitHub Actions"
              git config --global user.email "actions@github.com"
              git add CITATION.cff
              git commit -m "chore: add DOI to CITATION.cff [skip ci]" || true
              git push || true
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ steps.release.outputs.version }}
          body: |
            ## Atlas Vivo MILK - Plataforma Web ${{ steps.release.outputs.version }}
            
            ### DOI
            [${{ env.DOI }}](https://doi.org/${{ env.DOI }})
            
            ### Changes
            - Automatic release from GitHub Actions
            - Published to Zenodo
            - Updated CITATION.cff with DOI
            
            ### Assets
            - Web application (HTML, CSS, JavaScript)
            - Backend (Google Apps Script)
            - Metadata (JSON, CFF)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-orcid:
    name: Sync with ORCID
    runs-on: ubuntu-latest
    needs: generate-doi
    steps:
      - name: Notify ORCID
        env:
          ORCID_TOKEN: ${{ secrets.ORCID_TOKEN }}
          DOI: ${{ needs.generate-doi.outputs.doi }}
        run: |
          if [ -n "$ORCID_TOKEN" ] && [ -n "$DOI" ]; then
            curl -s -X POST \
              -H "Authorization: Bearer $ORCID_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "work": {
                  "title": "${{ github.event.repository.name }} - ${{ needs.generate-doi.outputs.version }}",
                  "doi": "$DOI",
                  "url": "${{ github.event.repository.html_url }}/releases/tag/${{ github.ref }}",
                  "type": "software",
                  "published": "$(date +%Y-%m-%d)"
                }
              }' \
              https://api.orcid.org/v3.0/0000-0000-0000-0000/work
          else
            echo "Skipping ORCID sync: missing token or DOI"
          fi

  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [generate-doi, sync-orcid]
    if: always()
    steps:
      - name: Send notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_TITLE: "Release ${{ github.ref }} ${{ job.status }}"
          SLACK_MESSAGE: |
            Repository: ${{ github.event.repository.name }}
            Version: ${{ needs.generate-doi.outputs.version || 'unknown' }}
            DOI: ${{ needs.generate-doi.outputs.doi || 'not generated' }}
            Status: ${{ job.status }}
