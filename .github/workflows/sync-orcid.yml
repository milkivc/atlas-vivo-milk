name: Sync with ORCID

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Notify ORCID
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.ORCID_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"work": {"title": "${{ github.event.release.name }}", "doi": "${{ env.DOI }}", "url": "${{ github.event.release.html_url }}"}}' \
            https://api.orcid.org/v3.0/0000-0000-0000-0000/work
