name: Zenodo + ORCID + Codeberg Sync

on:
  push:
    branches: [ master, main ]
    paths:
      - 'metadata.json'
      - '.zenodo.json'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force synchronization with Zenodo'
        required: false
        default: 'false'

jobs:
  validate-metadata:
    name: Validate Metadata
    runs-on: ubuntu-latest
    outputs:
      doi: ${{ steps.extract-doi.outputs.doi }}
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g ajv-cli jq

      - name: Validate metadata.json
        run: |
          ajv validate -s .github/schemas/metadata-schema.json -d metadata.json --spec=draft7 || true
          jq empty metadata.json

      - name: Extract DOI
        id: extract-doi
        run: |
          DOI=$(jq -r '.doi // empty' metadata.json)
          echo "doi=$DOI" >> $GITHUB_OUTPUT
          echo "Extracted DOI: $DOI"

      - name: Extract Version
        id: extract-version
        run: |
          VERSION=$(jq -r '.version // empty' metadata.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted Version: $VERSION"

  sync-zenodo:
    name: Sync with Zenodo
    runs-on: ubuntu-latest
    needs: validate-metadata
    if: ${{ needs.validate-metadata.outputs.doi != '' || github.event.inputs.force_sync == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pyyaml

      - name: Prepare Zenodo deposit
        id: prepare-deposit
        run: |
          # Create deposit metadata from metadata.json
          jq '{title, description, license, keywords, creators, version, datePublished, doi, relatedIdentifiers}' metadata.json > zenodo-deposit.json
          
          # Add Zenodo-specific fields
          jq '. + {
            "upload_type": "software",
            "notes": "Atlas Vivo MILK - Plataforma Web para preservacao e mapeamento do patrimonio imaterial portugues. Conformidade com RGPD, AI Act e NIS2.",
            "communities": [{"identifier": "milkivc"}]
          }' zenodo-deposit.json > zenodo-deposit-full.json
          
          echo "deposit_file=zenodo-deposit-full.json" >> $GITHUB_OUTPUT
          cat zenodo-deposit-full.json

      - name: Upload to Zenodo (if ZENODO_TOKEN available)
        id: upload-zenodo
        if: env.ZENODO_TOKEN != ''
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          
          # Load deposit metadata
          with open('zenodo-deposit-full.json', 'r') as f:
              deposit_data = json.load(f)
          
          # Zenodo API endpoint
          api_url = "https://zenodo.org/api/deposit/depositions"
          
          # Create new deposit
          headers = {
              "Content-Type": "application/json"
          }
          params = {
              "access_token": os.environ['ZENODO_TOKEN']
          }
          
          response = requests.post(
              api_url,
              params=params,
              json={"metadata": deposit_data},
              headers=headers
          )
          
          if response.status_code == 201:
              deposit_id = response.json()["id"]
              print(f"Created Zenodo deposit: {deposit_id}")
              
              # Upload files
              files_to_upload = ["metadata.json", ".zenodo.json", "README.md"]
              for filename in files_to_upload:
                  if os.path.exists(filename):
                      with open(filename, 'rb') as f:
                          files = {filename: f}
                          upload_url = f"https://zenodo.org/api/deposit/depositions/{deposit_id}/files"
                          upload_response = requests.post(
                              upload_url,
                              params={"access_token": os.environ['ZENODO_TOKEN']},
                              files=files
                          )
                          if upload_response.status_code == 201:
                              print(f"Uploaded {filename} to Zenodo")
              
              # Publish deposit
              publish_url = f"https://zenodo.org/api/deposit/depositions/{deposit_id}/actions/publish"
              publish_response = requests.post(
                  publish_url,
                  params={"access_token": os.environ['ZENODO_TOKEN']}
              )
              if publish_response.status_code == 202:
                  print("Deposit published to Zenodo")
                  doi = publish_response.json().get("doi", "")
                  print(f"DOI: {doi}")
                  with open('.zenodo.json', 'r') as f:
                      zenodo_data = json.load(f)
                  zenodo_data['metadata']['doi'] = doi
                  with open('.zenodo.json', 'w') as f:
                      json.dump(zenodo_data, f, indent=2)
              else:
                  print(f"Failed to publish: {publish_response.text}")
          else:
              print(f"Failed to create deposit: {response.text}")
          EOF
        else:
          echo "::warning::ZENODO_TOKEN not available. Skipping Zenodo upload."
          echo "To enable Zenodo integration, add ZENODO_TOKEN secret in GitHub Secrets"

  sync-codeberg:
    name: Sync with Codeberg
    runs-on: ubuntu-latest
    needs: validate-metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mirror to Codeberg (if CODEBERG_TOKEN available)
        if: env.CODEBERG_TOKEN != ''
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          echo "::warning::Codeberg sync requires CODEBERG_TOKEN secret"
          echo "To enable Codeberg integration, add CODEBERG_TOKEN secret in GitHub Secrets"
          echo "Current repository will be mirrored to: https://codeberg.org/milkivc/associacao-milk-marco-zero"

  validate-orcid-api:
    name: Validate ORCID via API
    runs-on: ubuntu-latest
    needs: validate-metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate ORCIDs with ORCID API
        if: env.ORCID_TOKEN != ''
        env:
          ORCID_TOKEN: ${{ secrets.ORCID_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          import re
          
          # Extract ORCIDs from metadata.json
          with open('metadata.json', 'r') as f:
              metadata = json.load(f)
          
          orcid_pattern = r'^\d{4}-\d{4}-\d{4}-\d{4}$'
          
          for creator in metadata.get('creators', []):
              orcid = creator.get('orcid', '')
              if orcid and re.match(orcid_pattern, orcid):
                  # Validate ORCID via API
                  orcid_id = orcid.replace('-', '')
                  api_url = f"https://api.orcid.org/v3.0/{orcid_id}/record"
                  
                  headers = {
                      "Accept": "application/json"
                  }
                  
                  if os.environ.get('ORCID_TOKEN'):
                      headers["Authorization"] = f"Bearer {os.environ['ORCID_TOKEN']}"
                  
                  response = requests.get(api_url, headers=headers)
                  
                  if response.status_code == 200:
                      print(f"✅ ORCID {orcid} is valid")
                  else:
                      print(f"⚠️  ORCID {orcid} validation failed: {response.status_code}")
              else:
                  print(f"❌ Invalid ORCID format: {orcid}")
          EOF
        else:
          echo "::warning::ORCID_TOKEN not available. Skipping ORCID API validation."
          echo "To enable ORCID API validation, add ORCID_TOKEN secret in GitHub Secrets"

  update-metadata:
    name: Update Metadata with DOI
    runs-on: ubuntu-latest
    needs: [sync-zenodo, validate-orcid-api]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update metadata.json with DOI from Zenodo
        if: needs.sync-zenodo.result == 'success'
        run: |
          if [ -f ".zenodo.json" ]; then
            ZENODO_DOI=$(jq -r '.metadata.doi // empty' .zenodo.json)
            if [ -n "$ZENODO_DOI" ]; then
              jq --arg doi "$ZENODO_DOI" '.doi = $doi' metadata.json > metadata-temp.json
              mv metadata-temp.json metadata.json
              
              echo "✅ Updated metadata with DOI: $ZENODO_DOI"
              
              git config --global user.name "GitHub Actions"
              git config --global user.email "actions@github.com"
              git add metadata.json .zenodo.json
              git commit -m "chore: update DOI from Zenodo [$ZENODO_DOI]" || true
              git push origin HEAD:master || true
            fi
          fi
